<!DOCTYPE html>
<html>

<head>
<title>History Pool Leaderboard</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

</head>

<body>

<div id="header">

<div class="hero-image"></div>

</div>

<div id="tournamentInfo">

<div id="tournamentStatus">
Live Tournament Scores
</div>

</div>

<div id="updateInfo">

<span id="lastUpdated">Last Updated: --</span>

<span class="refreshSpinner"
id ="refreshSpinner">⏳ Updating...</span>

</div>

<div id="expandNote">
Click a team to see their players ▼
</div>


<div class="headerSection">
<h1>Pool Leaderboard</h1>

<h2 id="poolTitle"></h2>

<div style="margin-bottom:10px;">
<input 
class="teamSearch"
id="teamSearch"
type="text"
placeholder="Search for your team..."
onkeyup="filterTeams()"
>
</div>

<div style="margin-bottom:15px;">
<select id="poolSelector" onchange="changePool()">
</select>
</div>
</div>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1ZmRjZnNnZGFianRueGZ4dWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NjA0MDIsImV4cCI6MjA4OTAzNjQwMn0.p8BiiUN6uHOcVQVDEOEAgc-B4ZsyLQtDqsIZ-tnu63c"

const RESULTS_ENDPOINT =
"https://pufdcfsgdabjtnxfxuat.supabase.co/rest/v1/pool_results?select=*"

let results = []

function normalizeName(name){

if(!name) return ""

return name
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.toLowerCase()
.trim()

}

function titleCase(name){
return name.replace(/\b\w/g,c=>c.toUpperCase())
}

async function loadHistory(){

const res = await fetch(RESULTS_ENDPOINT,{
headers:{
apikey:API_KEY,
Authorization:`Bearer ${API_KEY}`
}
})

results = await res.json()

console.log("History results:", results)

populateDropdown()

if(results.length){
loadPool(results[0].id)
}


// sort newest tournaments first
results.sort((a,b)=>
new Date(b.created_at) - new Date(a.created_at)
)

populateDropdown()

if(results.length){

loadPool(results[0].id)

}else{

document.getElementById("poolTitle").innerText =
"No historical results available"

}

}

function populateDropdown(){

const selector = document.getElementById("poolSelector")

selector.innerHTML=""

// group results by year
const years = {}

results.forEach(r=>{
if(!years[r.year]){
years[r.year] = []
}
years[r.year].push(r)
})

// newest year first
Object.keys(years)
.sort((a,b)=>b-a)
.forEach(year=>{

const group = document.createElement("optgroup")
group.label = year

years[year]
.sort((a,b)=>a.tournament_name.localeCompare(b.tournament_name))
.forEach(r=>{

const option = document.createElement("option")

option.value = r.id

option.textContent =
`${r.tournament_name} — ${r.pool_name}`

group.appendChild(option)

})

selector.appendChild(group)

})

}

function changePool(){

const id = document.getElementById("poolSelector").value

loadPool(id)

}

function loadPool(id){

const row = results.find(r => r.id == id)

document.getElementById("poolTitle").innerText =
`${row.year} ${row.tournament_name} — ${row.pool_name}`

document.title =
`${row.year} ${row.tournament_name} — ${row.pool_name}`

let leaderboard = row.leaderboard

// handle JSONB string response
if(typeof leaderboard === "string"){
leaderboard = JSON.parse(leaderboard)
}

renderLeaderboard(leaderboard)

}

function renderLeaderboard(teams){

const tbody = document.querySelector("#leaderboard tbody")
tbody.innerHTML=""

teams.forEach((team,i)=>{

const row=document.createElement("tr")

let medal=""

if(i===0) medal="🥇 "
if(i===1) medal="🥈 "
if(i===2) medal="🥉 "

row.innerHTML=`
<td>${i+1}</td>

<td style="cursor:pointer;font-weight:${i<3?'bold':'normal'}">

<span class="arrow">▶</span>
${medal}${team.name}

</td>

<td>${team.total}</td>
`

tbody.appendChild(row)

const detailRow=document.createElement("tr")

detailRow.style.display="none"

const playerHtml = team.players.map(p=>{

const counting =
team.best4.some(b =>
  normalizeName(b) === normalizeName(p.name)
)

return `
<div style="display:flex;justify-content:space-between">

<span>
${counting ? "✔" : "✖"} ${titleCase(p.name)}
</span>

<span ${counting ? 'style="font-weight:bold"' : ''}>
${p.score}
</span>

</div>
`

}).join("")

detailRow.innerHTML=`
<td colspan="3" style="background:#f3f3f3">
${playerHtml}
</td>
`

tbody.appendChild(detailRow)

row.onclick=()=>{

const expanded =
detailRow.style.display === "table-row"

detailRow.style.display =
expanded ? "none" : "table-row"

const arrow = row.querySelector(".arrow")

arrow.textContent =
expanded ? "▶" : "▼"

}

})

}

function filterTeams(){

const input =
document.getElementById("teamSearch")
.value
.toLowerCase()

const rows =
document.querySelectorAll("#leaderboard tbody tr")

for(let i=0;i<rows.length;i+=2){

const teamRow = rows[i]
const detailRow = rows[i+1]

const text =
teamRow.innerText.toLowerCase()

const match = text.includes(input)

teamRow.style.display =
match ? "" : "none"

detailRow.style.display = "none"

}

}

loadHistory()

</script>

</body>

</html>
